<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Brand primary · purple family</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">

  <div>
    <div style="background:#7b00ff;height:56px;border:2px solid var(--border);"></div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:6px;">--purple</div>
    <div style="font-family:var(--vt);font-size:16px;color:var(--muted);">#7b00ff</div>
    <div style="font-family:var(--vt);font-size:14px;color:var(--white);">primary</div>
  </div>
  <div>
    <div style="background:#aa44ff;height:56px;border:2px solid var(--border);"></div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:6px;">--purple-light</div>
    <div style="font-family:var(--vt);font-size:16px;color:var(--muted);">#aa44ff</div>
    <div style="font-family:var(--vt);font-size:14px;color:var(--white);">accent</div>
  </div>
  <div>
    <div style="background:#5500aa;height:56px;border:2px solid var(--border);"></div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:6px;">--border</div>
    <div style="font-family:var(--vt);font-size:16px;color:var(--muted);">#5500aa</div>
    <div style="font-family:var(--vt);font-size:14px;color:var(--muted);">border</div>
  </div>
</div>
</div></body></html>
