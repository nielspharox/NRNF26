<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Complotgroepje · matrix-themed sub-group</div>
<div style="background:var(--bg2);border:2px solid var(--purple);padding:14px;position:relative;">
  <div style="font-family:var(--pixel);font-size:10px;color:var(--purple-light);margin-bottom:6px;">🐓 DE PHAROX BENDE</div>
  <div style="font-family:var(--vt);font-size:18px;color:var(--muted);margin-bottom:10px;">5 leden · 8 wedstrijden gespeeld</div>
  <div style="display:flex;flex-direction:column;gap:0;">
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(85,0,170,0.3);">
      <div style="width:28px;height:28px;border:2px solid var(--border);background:var(--bg3);"></div>
      <span style="font-family:var(--oswald);font-weight:700;font-size:18px;color:var(--white);">NIELS</span>
      <span style="font-family:var(--pixel);font-size:6px;color:var(--yellow);padding:1px 4px;border:1px solid var(--yellow);">HAANTJE</span>
      <span style="margin-left:auto;font-family:var(--pixel);font-size:9px;color:var(--green);">147</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(85,0,170,0.3);">
      <div style="width:28px;height:28px;border:2px solid var(--border);background:var(--bg3);"></div>
      <span style="font-family:var(--oswald);font-weight:700;font-size:18px;color:var(--white);">MIRJAM</span>
      <span style="margin-left:auto;font-family:var(--pixel);font-size:9px;color:var(--green);">132</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;">
      <div style="width:28px;height:28px;border:2px solid var(--border);background:var(--bg3);"></div>
      <span style="font-family:var(--oswald);font-weight:700;font-size:18px;color:var(--white);">JEROEN</span>
      <span style="margin-left:auto;font-family:var(--pixel);font-size:9px;color:var(--green);">98</span>
    </div>
  </div>
</div>
</div></body></html>
