<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Hard-edged shadows · offset, blur-less</div>
<div style="display:flex;gap:24px;align-items:flex-end;">
  <div style="text-align:center;">
    <div style="width:120px;height:60px;background:var(--bg2);border:2px solid var(--border);box-shadow:2px 2px 0 #000;"></div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:10px;">2px 2px 0 #000</div>
    <div style="font-family:var(--vt);font-size:16px;color:var(--muted);">badges, chips</div>
  </div>
  <div style="text-align:center;">
    <div style="width:120px;height:60px;background:var(--bg2);border:3px solid var(--border);box-shadow:4px 4px 0 #000;"></div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:10px;">4px 4px 0 #000</div>
    <div style="font-family:var(--vt);font-size:16px;color:var(--muted);">cards, buttons</div>
  </div>
  <div style="text-align:center;">
    <div style="width:120px;height:60px;background:var(--bg2);border:4px solid var(--purple);box-shadow:8px 8px 0 #000;"></div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:10px;">8px 8px 0 #000</div>
    <div style="font-family:var(--vt);font-size:16px;color:var(--muted);">modals</div>
  </div>
</div>
</div></body></html>
