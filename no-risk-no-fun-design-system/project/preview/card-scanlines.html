<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">CRT scanline backgrounds · always layered on every page</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <div>
    <div style="height:90px;background:var(--bg);background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);border:2px solid var(--border);"></div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:8px;">BASE (body)</div>
    <div style="font-family:var(--vt);font-size:14px;color:var(--muted);">4px stripe · 12% black</div>
  </div>
  <div>
    <div style="height:90px;background:var(--bg);background-image:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);border:2px solid var(--border);"></div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:8px;">OVERLAY (body::before)</div>
    <div style="font-family:var(--vt);font-size:14px;color:var(--muted);">3px stripe · 6% black · fixed · z 9999</div>
  </div>
</div>
</div></body></html>
