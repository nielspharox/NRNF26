<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  .btn{font-family:var(--pixel);font-size:9px;padding:10px 16px;border:3px solid;cursor:pointer;letter-spacing:0.04em;box-shadow:4px 4px 0 #000;display:inline-block;}
  .btn-green{background:var(--green);color:#000;border-color:var(--green-dark);}
  .btn-purple{background:var(--purple);color:var(--white);border-color:#4400cc;}
  .btn-yellow{background:var(--yellow);color:#000;border-color:#aa9900;}
  .btn-red{background:var(--red);color:#fff;border-color:#990022;}
  .btn-ghost{background:transparent;color:var(--muted);border-color:var(--border);}
  .btn-sm{font-size:7px;padding:6px 10px;box-shadow:2px 2px 0 #000;}
  
</style></head>
<body><div class="wrap">
<div class="label">Streak badges · silver → gold → purple-glow tiers</div>
<div style="display:flex;gap:18px;flex-wrap:wrap;align-items:center;">
  <span style="font-family:var(--pixel);font-size:8px;display:inline-block;padding:3px 8px;border:2px solid #cccccc;color:#cccccc;background:rgba(200,200,200,0.1);box-shadow:2px 2px 0 #000;">🐙 PAUL</span>
  <span style="font-family:var(--pixel);font-size:8px;display:inline-block;padding:3px 8px;border:2px solid #cccccc;color:#cccccc;background:rgba(200,200,200,0.1);box-shadow:2px 2px 0 #000;">🌵🤠 EL JEFE</span>
  <span style="font-family:var(--pixel);font-size:8px;display:inline-block;padding:3px 8px;border:2px solid var(--yellow);color:var(--yellow);background:rgba(255,230,0,0.15);box-shadow:2px 2px 0 #000;">⚡ THE CHOSEN ONE</span>
  <span style="font-family:var(--pixel);font-size:8px;display:inline-block;padding:3px 8px;border:2px solid var(--yellow);color:var(--yellow);background:rgba(255,230,0,0.15);box-shadow:2px 2px 0 #000;">🦬 SITTING BULL</span>
  <span style="font-family:var(--pixel);font-size:8px;display:inline-block;padding:3px 8px;border:3px solid var(--purple-light);color:var(--purple-light);background:rgba(170,68,255,0.15);box-shadow:0 0 12px var(--purple-light),0 0 24px rgba(170,68,255,0.4);">🔮 THE ORACLE</span>
</div>
<div style="font-family:var(--vt);font-size:16px;color:var(--muted);margin-top:12px;">Silver 2-4 · Gold 6-10 · Purple glow 12+</div>
</div></body></html>
