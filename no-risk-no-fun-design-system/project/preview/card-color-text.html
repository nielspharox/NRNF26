<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Text colors · on dark</div>
<div style="background:var(--bg2);border:2px solid var(--border);padding:14px 18px;display:flex;flex-direction:column;gap:8px;">
  <div style="font-family:var(--vt);font-size:22px;color:var(--white);">Primary text — <span style="font-family:var(--pixel);font-size:9px;">--white #f0e6ff</span></div>
  <div style="font-family:var(--vt);font-size:20px;color:var(--muted);">Secondary text — <span style="font-family:var(--pixel);font-size:9px;">--muted #d4bef5</span></div>
  <div style="font-family:var(--vt);font-size:20px;color:var(--green);">Success / accent — <span style="font-family:var(--pixel);font-size:9px;">--green #00ff66</span></div>
  <div style="font-family:var(--vt);font-size:20px;color:var(--yellow);">Highlight / streak — <span style="font-family:var(--pixel);font-size:9px;">--yellow #ffe600</span></div>
  <div style="font-family:var(--vt);font-size:20px;color:var(--red);">Danger / locked — <span style="font-family:var(--pixel);font-size:9px;">--red #ff2244</span></div>
</div>
</div></body></html>
