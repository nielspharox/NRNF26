<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Modal box · 4px purple border · 8px hard shadow</div>
<div style="background:rgba(0,0,0,0.85);padding:20px;">
  <div style="background:var(--bg2);border:4px solid var(--purple);box-shadow:8px 8px 0 #000;padding:1.25rem;position:relative;">
    <button style="position:absolute;top:12px;right:12px;font-family:var(--pixel);font-size:8px;background:transparent;border:2px solid var(--border);color:var(--muted);padding:4px 8px;cursor:pointer;">✕ SLUITEN</button>
    <div style="font-family:var(--pixel);font-size:10px;color:var(--green);margin-bottom:10px;">MAAK EEN SLAPER WAKKER 🐑</div>
    <div style="font-family:var(--pixel);font-size:9px;color:var(--muted);margin-bottom:6px;">GEBRUIKERSNAAM VAN DE SLAAPKOP:</div>
    <input type="text" value="petra99" style="width:100%;background:var(--bg3);color:var(--green);border:2px solid var(--border);padding:8px 10px;font-family:var(--vt);font-size:20px;outline:none;margin-bottom:10px;">
    <div style="display:flex;gap:8px;">
      <button style="font-family:var(--pixel);font-size:9px;padding:8px 14px;border:3px solid #4400cc;background:var(--purple);color:var(--white);box-shadow:4px 4px 0 #000;cursor:pointer;">💊 RODE PIL GEVEN ▶</button>
      <button style="font-family:var(--pixel);font-size:9px;padding:8px 14px;border:3px solid var(--border);background:transparent;color:var(--muted);box-shadow:4px 4px 0 #000;cursor:pointer;">✕ ANNULEER</button>
    </div>
  </div>
</div>
</div></body></html>
