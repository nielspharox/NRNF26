<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Full type stack · all three working together</div>
<div style="background:var(--bg2);border:3px solid var(--border);padding:16px;position:relative;">
  <div style="font-family:var(--pixel);font-size:13px;color:var(--green);text-shadow:3px 3px 0 #004422;margin-bottom:4px;">▶ JOUW TIPS</div>
  <div style="font-family:var(--vt);font-size:20px;color:var(--muted);margin-bottom:14px;">Vergrendeld bij aftrap · Knockout na 120 min</div>
  <div style="display:flex;gap:12px;align-items:center;">
    <span style="font-family:var(--oswald);font-weight:700;font-size:18px;color:var(--white);">🇳🇱 NETHERLANDS</span>
    <span style="font-family:var(--pixel);font-size:9px;color:var(--muted);">vs</span>
    <span style="font-family:var(--oswald);font-weight:700;font-size:18px;color:var(--white);">BRAZIL 🇧🇷</span>
  </div>
</div>
</div></body></html>
