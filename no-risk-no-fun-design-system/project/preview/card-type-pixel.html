<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Press Start 2P · pixel font for labels &amp; titles</div>
<div style="display:flex;flex-direction:column;gap:10px;">
  <div><span style="font-family:var(--pixel);font-size:13px;color:var(--green);text-shadow:3px 3px 0 #004422;">▶ SECTION TITLE</span> <span style="font-family:var(--vt);font-size:14px;color:var(--muted);"> · 13px</span></div>
  <div><span style="font-family:var(--pixel);font-size:11px;color:var(--green);">MODAL HEADING</span> <span style="font-family:var(--vt);font-size:14px;color:var(--muted);"> · 11px</span></div>
  <div><span style="font-family:var(--pixel);font-size:9px;color:var(--white);">BUTTON / TAB LABEL</span> <span style="font-family:var(--vt);font-size:14px;color:var(--muted);"> · 9px</span></div>
  <div><span style="font-family:var(--pixel);font-size:8px;color:var(--yellow);background:rgba(255,230,0,0.15);border:2px solid var(--yellow);padding:3px 8px;">🐙 PAUL</span> <span style="font-family:var(--vt);font-size:14px;color:var(--muted);"> · 8px badge</span></div>
  <div><span style="font-family:var(--pixel);font-size:7px;color:var(--muted);">SMALLEST LABEL · MIN 7PX</span> <span style="font-family:var(--vt);font-size:14px;color:var(--muted);"> · 7px floor</span></div>
</div>
</div></body></html>
