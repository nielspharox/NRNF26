<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Mascot · "De Condor" · the brand's sole illustration</div>
<div style="display:flex;gap:18px;align-items:flex-end;">
  <div style="width:80px;height:80px;border:3px solid var(--green);background:#000;box-shadow:4px 4px 0 #000;overflow:hidden;">
    <img src="../assets/mascot.png" style="width:100%;height:100%;object-fit:cover;object-position:top center;">
  </div>
  <div style="width:120px;height:120px;border:3px solid var(--green);background:#000;box-shadow:4px 4px 0 #000;overflow:hidden;">
    <img src="../assets/mascot.png" style="width:100%;height:100%;object-fit:cover;object-position:top center;">
  </div>
  <div style="width:160px;height:160px;border:3px solid var(--green);background:#000;box-shadow:4px 4px 0 #000;overflow:hidden;">
    <img src="../assets/mascot.png" style="width:100%;height:100%;object-fit:cover;object-position:top center;">
  </div>
  <div style="font-family:var(--vt);font-size:16px;color:var(--muted);line-height:1.5;flex:1;">
    Always inside a square frame · 3px green border · 4px black shadow · <code style="font-family:var(--pixel);font-size:9px;">object-position: top center</code> for the head crop.
  </div>
</div>
</div></body></html>
