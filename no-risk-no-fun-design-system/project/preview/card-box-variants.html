<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Card box · default vs green-emphasis vs admin-dashed</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <div style="background:var(--bg2);border:3px solid var(--border);padding:14px;">
    <div style="font-family:var(--pixel);font-size:10px;color:var(--yellow);margin-bottom:8px;">🎯 PUNTENSYSTEEM</div>
    <div style="font-family:var(--vt);font-size:18px;color:var(--white);line-height:1.5;">Punten = <span style="color:var(--green);font-family:var(--pixel);font-size:11px;">100 / kans%</span></div>
  </div>
  <div style="background:var(--bg2);border:3px solid var(--green);padding:14px;">
    <div style="font-family:var(--pixel);font-size:10px;color:var(--green);margin-bottom:8px;">⚽ HOE WERKT HET?</div>
    <div style="font-family:var(--vt);font-size:18px;color:var(--white);line-height:1.5;">Tip thuisploeg, gelijk, of uitploeg. Vergrendeld bij aftrap.</div>
  </div>
</div>
<div style="background:rgba(123,0,255,0.08);border:2px dashed var(--purple);padding:14px;margin-top:14px;">
  <div style="font-family:var(--pixel);font-size:11px;color:var(--purple-light);margin-bottom:8px;">⚙ ADMIN PANEL</div>
  <div style="font-family:var(--vt);font-size:18px;color:var(--muted);">Dashed border signals admin-only surfaces. Always purple.</div>
</div>
</div></body></html>
