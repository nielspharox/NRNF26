<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Streak indicator · banana.gif at 24px, pixelated · 1 banana per ~2 streaks</div>
<div style="display:flex;flex-direction:column;gap:10px;">
  <div style="display:flex;align-items:center;gap:14px;">
    <span style="display:inline-flex;gap:0;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"></span>
    <span style="font-family:var(--pixel);font-size:8px;border:2px solid #cccccc;color:#cccccc;background:rgba(200,200,200,0.1);padding:3px 8px;box-shadow:2px 2px 0 #000;">🐙 PAUL</span>
    <span style="font-family:var(--vt);font-size:18px;color:var(--muted);">streak 2-4</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <span style="display:inline-flex;gap:0;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"></span>
    <span style="font-family:var(--pixel);font-size:8px;border:2px solid var(--yellow);color:var(--yellow);background:rgba(255,230,0,0.15);padding:3px 8px;box-shadow:2px 2px 0 #000;">⚡ THE CHOSEN ONE</span>
    <span style="font-family:var(--vt);font-size:18px;color:var(--muted);">streak 6-10</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <span style="display:inline-flex;gap:0;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"><img src="../assets/banana.gif" style="width:24px;height:24px;image-rendering:pixelated;"></span>
    <span style="font-family:var(--pixel);font-size:8px;border:3px solid var(--purple-light);color:var(--purple-light);background:rgba(170,68,255,0.15);padding:3px 8px;box-shadow:0 0 12px var(--purple-light),0 0 24px rgba(170,68,255,0.4);">🔮 THE ORACLE</span>
    <span style="font-family:var(--vt);font-size:18px;color:var(--muted);">streak 12+</span>
  </div>
</div>
</div></body></html>
