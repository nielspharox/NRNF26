<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Iconography · emoji is the icon system · no SVG, no icon font</div>
<table style="width:100%;font-family:var(--vt);font-size:18px;border-collapse:collapse;">
  <tr><td style="padding:6px 0;font-size:22px;width:50px;">🏠</td><td style="color:var(--muted);">home tab</td><td style="font-size:22px;width:50px;">⚽</td><td style="color:var(--muted);">tips tab</td></tr>
  <tr><td style="padding:6px 0;font-size:22px;">🏆</td><td style="color:var(--muted);">leaderboard</td><td style="font-size:22px;">📖</td><td style="color:var(--muted);">rules tab</td></tr>
  <tr><td style="padding:6px 0;font-size:22px;">📋</td><td style="color:var(--muted);">tournament</td><td style="font-size:22px;">⚙</td><td style="color:var(--muted);">admin</td></tr>
  <tr><td style="padding:6px 0;font-size:22px;">🐓</td><td style="color:var(--muted);">haantje (leader)</td><td style="font-size:22px;">🐑</td><td style="color:var(--muted);">slaper (invitee)</td></tr>
  <tr><td style="padding:6px 0;font-size:22px;">💊</td><td style="color:var(--muted);">red pill (invite)</td><td style="font-size:22px;">😴</td><td style="color:var(--muted);">remove member</td></tr>
  <tr><td style="padding:6px 0;font-size:22px;">⚔️</td><td style="color:var(--muted);">head-to-head</td><td style="font-size:22px;">🎯</td><td style="color:var(--muted);">odds beater</td></tr>
  <tr><td style="padding:6px 0;color:var(--green);font-family:var(--pixel);font-size:18px;">▶</td><td style="color:var(--muted);">action arrow</td><td style="color:var(--red);font-family:var(--pixel);font-size:18px;">✕</td><td style="color:var(--muted);">close modal</td></tr>
  <tr><td style="padding:6px 0;color:var(--green);font-family:var(--pixel);font-size:18px;">✔</td><td style="color:var(--muted);">success</td><td style="color:var(--red);font-family:var(--pixel);font-size:18px;">✗</td><td style="color:var(--muted);">error</td></tr>
</table>
</div></body></html>
