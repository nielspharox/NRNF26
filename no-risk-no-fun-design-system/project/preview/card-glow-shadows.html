<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  
</style></head>
<body><div class="wrap">
<div class="label">Glow shadows · used sparingly, for high-streak signal</div>
<div style="display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap;">
  <div style="text-align:center;">
    <div style="display:inline-block;font-family:var(--pixel);font-size:8px;padding:6px 12px;border:3px solid var(--purple-light);color:var(--purple-light);background:rgba(170,68,255,0.15);box-shadow:0 0 12px var(--purple-light),0 0 24px rgba(170,68,255,0.4);">🔮 THE ORACLE</div>
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:14px;">--glow-purple</div>
    <div style="font-family:var(--vt);font-size:16px;color:var(--muted);">streak 12+</div>
  </div>
  <div style="text-align:center;">
    <input type="text" value="focused input" style="background:var(--bg3);border:2px solid var(--green);color:var(--green);font-family:var(--vt);font-size:20px;padding:8px 12px;outline:none;box-shadow:0 0 8px rgba(0,255,102,0.25);">
    <div style="font-family:var(--pixel);font-size:7px;color:var(--white);margin-top:14px;">--glow-green</div>
    <div style="font-family:var(--vt);font-size:16px;color:var(--muted);">input :focus</div>
  </div>
</div>
</div></body></html>
