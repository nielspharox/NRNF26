<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--vt);font-size:var(--vt-meta);width:700px;min-height:100px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}
  .wrap{padding:20px 24px;}
  .label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  .btn{font-family:var(--pixel);font-size:9px;padding:10px 16px;border:3px solid;cursor:pointer;letter-spacing:0.04em;box-shadow:4px 4px 0 #000;display:inline-block;}
  .btn-green{background:var(--green);color:#000;border-color:var(--green-dark);}
  .btn-purple{background:var(--purple);color:var(--white);border-color:#4400cc;}
  .btn-yellow{background:var(--yellow);color:#000;border-color:#aa9900;}
  .btn-red{background:var(--red);color:#fff;border-color:#990022;}
  .btn-ghost{background:transparent;color:var(--muted);border-color:var(--border);}
  .btn-sm{font-size:7px;padding:6px 10px;box-shadow:2px 2px 0 #000;}
  
</style></head>
<body><div class="wrap">
<div class="label">Nav tabs · purple bar with green active label</div>
<div style="background:var(--bg2);border-bottom:3px solid var(--purple);display:flex;overflow-x:auto;">
  <button style="font-family:var(--pixel);font-size:9px;padding:12px 16px;background:var(--purple);border:none;border-right:2px solid var(--border);color:var(--green);cursor:pointer;">🏠 HOME</button>
  <button style="font-family:var(--pixel);font-size:9px;padding:12px 16px;background:transparent;border:none;border-right:2px solid var(--border);color:var(--muted);cursor:pointer;">⚽ TIPS</button>
  <button style="font-family:var(--pixel);font-size:9px;padding:12px 16px;background:transparent;border:none;border-right:2px solid var(--border);color:var(--muted);cursor:pointer;">🏆 STAND</button>
  <button style="font-family:var(--pixel);font-size:9px;padding:12px 16px;background:transparent;border:none;border-right:2px solid var(--border);color:var(--muted);cursor:pointer;">📖 SPELREGELS</button>
  <button style="font-family:var(--pixel);font-size:9px;padding:12px 16px;background:transparent;border:none;color:var(--muted);cursor:pointer;">📋 TOERNOOI</button>
</div>
<div class="label" style="margin-top:14px;">Phase tabs · sub-navigation</div>
<div style="display:flex;gap:6px;flex-wrap:wrap;">
  <button style="font-family:var(--pixel);font-size:9px;padding:8px 12px;border:2px solid var(--purple);background:var(--purple);color:var(--white);cursor:pointer;">ALLES</button>
  <button style="font-family:var(--pixel);font-size:9px;padding:8px 12px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;">RONDE 1</button>
  <button style="font-family:var(--pixel);font-size:9px;padding:8px 12px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;">RONDE 2</button>
  <button style="font-family:var(--pixel);font-size:9px;padding:8px 12px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;">1/4</button>
  <button style="font-family:var(--pixel);font-size:9px;padding:8px 12px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;">FINALE</button>
</div>
</div></body></html>
